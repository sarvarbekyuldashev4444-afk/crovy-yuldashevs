app = "crovy-yuldashevs"

primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  APP_URL = "https://crovy-yuldashevs.fly.dev"
  WEBAPP_URL = "https://crovy-yuldashevs.fly.dev"
  BOT_USERNAME = "crovybot"

[[mounts]]
  source = "data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

[checks]
  [checks.web]
    grace_period = "20s"
    interval = "30s"
    method = "get"
    path = "/api/health"
    port = 8080
    timeout = "5s"
    type = "http"
