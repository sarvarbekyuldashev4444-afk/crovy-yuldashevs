# fly.toml app configuration file generated for crovy-yuldashevs on 2026-05-09T22:51:47Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'crovy-yuldashevs'
primary_region = 'arn'
kill_signal = 'SIGINT'
kill_timeout = '5s'

[build]
  dockerfile = 'Dockerfile'

[env]
  APP_URL = 'https://crovy-yuldashevs.fly.dev'
  BOT_USERNAME = 'crovybot'
  DATA_DIR = '/data'
  DB_PATH = '/data/market.db'
  PORT = '8080'
  PYTHONUNBUFFERED = '1'
  SEED_DB_PATH = '/app/market.db'
  SEED_UPLOAD_DIR = '/app/webapp/uploads'
  TZ = 'Asia/Tashkent'
  UPLOAD_DIR = '/data/uploads'
  WEBAPP_URL = 'https://crovy-yuldashevs.fly.dev'

[[mounts]]
  source = 'data'
  destination = '/data'
  initial_size = '1GB'
  snapshot_retention = 7
  auto_extend_size_threshold = 80
  auto_extend_size_increment = '1GB'
  auto_extend_size_limit = '5GB'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 100
    soft_limit = 50

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '20s'
    method = 'GET'
    path = '/api/health'
    protocol = 'http'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
